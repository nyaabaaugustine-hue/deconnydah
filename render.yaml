services:
  - type: web
    name: degoony-fleet
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node --import tsx server/index.ts
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: PORT
        value: 3001
